{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>{% block title %}DealHunter{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'games/style.css' %}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="{% url 'games:home' %}" class="logo">🎮 DealHunter</a>

            <div id="navbar-search">
                <form action="{% url 'games:home' %}" method="get">
                    <div class="custom-search-container">
                        <span class="search-icon">🔍</span>
                        <input type="text" name="q" class="custom-search-input" placeholder="Search anything..." value="{{ search_query }}">
                        <button type="submit" class="custom-search-button">Search</button>
                    </div>
                </form>
            </div>

            <div class="nav-links">
                {% if user.is_authenticated %}
                    <a href="{% url 'games:profile' %}" class="btn-auth">My Profile</a>
                {% else %}
                    <a href="{% url 'login' %}" class="btn-auth">Login</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 DealHunter — Data provided by CheapShark API</p>
    </footer>
</body>
</html>
