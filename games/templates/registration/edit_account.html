{% extends 'games/base.html' %}
{% load static %}

{% block content %}
<div style="max-width: 600px; margin: 50px auto; padding: 40px; background: #121212; border-radius: 24px; border: 1px solid #333; box-shadow: 0 20px 50px rgba(0,0,0,0.5);">
    <h2 style="text-align: center; margin-bottom: 30px; color: white;">✏️ Edit Account</h2>

    <form method="post">
        {% csrf_token %}

        <label style="color: #666; font-size: 0.7rem; text-transform: uppercase; display: block; margin-bottom: 15px; letter-spacing: 1px;">Selecciona tu Avatar</label>
        <div style="display: flex; justify-content: space-around; margin-bottom: 30px; background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #222;">
            {% for val, name in form.fields.avatar.choices %}
            <label style="cursor: pointer; text-align: center;">
                <input type="radio" name="avatar" value="{{ val }}" style="display: none;" {% if val == form.avatar.value or val == current_avatar %}checked{% endif %}>
                <img src="{% static 'games/avatars/' %}{{ val }}" class="av-opt" style="width: 75px; height: 75px; border-radius: 50%; border: 3px solid transparent; transition: 0.3s; padding: 2px;">
                <div style="color: #555; font-size: 0.6rem; margin-top: 8px; text-transform: uppercase;">{{ name }}</div>
            </label>
            {% endfor %}
        </div>

        <div style="margin-bottom: 20px;">
            <label style="color: #666; font-size: 0.7rem; text-transform: uppercase;">Username</label>
            <input type="text" name="username" value="{{ form.username.value }}" style="width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 12px; margin-top: 5px;">
        </div>

        <div style="margin-bottom: 20px;">
            <label style="color: #666; font-size: 0.7rem; text-transform: uppercase;">Email (No editable)</label>
            <input type="text" value="{{ user.email }}" disabled style="width: 100%; padding: 12px; background: #000; border: 1px solid #222; color: #444; border-radius: 12px; margin-top: 5px; cursor: not-allowed;">
        </div>

        <div style="margin-bottom: 35px;">
            <label style="color: #666; font-size: 0.7rem; text-transform: uppercase;">Nueva Contraseña</label>
            <input type="password" name="password" placeholder="Dejar en blanco para mantener actual" style="width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 12px; margin-top: 5px;">
        </div>

        <div style="display: flex; gap: 15px;">
            <a href="{% url 'games:profile' %}" style="flex: 1; text-align: center; padding: 15px; background: #222; color: #eee; border-radius: 12px; text-decoration: none; font-weight: bold; border: 1px solid #333;">Cancelar</a>
            <button type="submit" style="flex: 2; padding: 15px; background: #7c4dff; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s;">GUARDAR CAMBIOS</button>
        </div>
    </form>
</div>

<style>
    .av-opt:hover { transform: scale(1.1); }
    input[type="radio"]:checked + .av-opt {
        border-color: #00e676 !important;
        box-shadow: 0 0 20px rgba(0,230,118,0.3);
        transform: scale(1.15);
        background: rgba(0,230,118,0.1);
    }
</style>
{% endblock %}
